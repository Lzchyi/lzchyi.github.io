<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <style>
    :root {
      --bg: #06070a;
      --text: #f5f7fb;
      --muted: #a6afbd;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --accent: #8ab4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: var(--text);

      background:
        radial-gradient(circle at 20% 20%, rgba(138,180,255,0.15), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.05), transparent 25%),
        linear-gradient(180deg, #0a0d14 0%, #06070a 50%, #040507 100%);

      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      opacity: 0.95;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(138,180,255,0.12));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .app-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      font-size: 14px;
      transition: 0.2s ease;
    }

    .button:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo">
      <img src="/images/zc-logo.svg" alt="ZC logo">
    </div>

    <div class="card">

      <div class="app-name">Your App Name</div>

      <h1>Coming soon</h1>

      <div class="subtitle">
        A focused experience, currently in development.
      </div>

      <div class="status">
        Built with intention. Launching when it feels right.
      </div>

      <a href="/" class="button">
        Back to home
      </a>

    </div>

    <div class="footer">
      Zhen Chyi Apps
    </div>

  </div>
</body>
</html>
