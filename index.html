<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhen Chyi Apps</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #05070b;
      color: #f5f5f7;
    }
    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }
    h1 {
      font-size: 52px;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    p {
      color: #b8c0cc;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .apps {
      display: grid;
      gap: 20px;
    }
    .card {
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.06);
    }
    .card h2 {
      margin: 0 0 6px;
      font-size: 26px;
    }
    .links {
      margin-top: 10px;
    }
    a {
      color: #8ab4ff;
      text-decoration: none;
      margin-right: 16px;
      font-size: 15px;
    }
    .footer {
      margin-top: 60px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Zhen Chyi Apps</h1>
    <p>Simple apps. Clean experience.</p>

    <div class="apps">

      <div class="card">
        <h2>Wanderly</h2>
        <p>Weather + atmosphere. Built for calm.</p>
        <div class="links">
          <a href="/wanderly/">Open</a>
          <a href="/wanderly/privacy/">Privacy</a>
        </div>
      </div>

      <div class="card">
        <h2>IsoPack</h2>
        <p>Travel packing. Fast and minimal.</p>
        <div class="links">
          <a href="/packmate/">Open</a>
          <a href="/packmate/privacy/">Privacy</a>
        </div>
      </div>

      <div class="card">
        <h2>CarSense</h2>
        <p>Log how a car really feels.</p>
        <div class="links">
          <a href="/carsense/">Open</a>
          <a href="/carsense/privacy/">Privacy</a>
        </div>
      </div>

    </div>

    <div class="footer">
      © 2026 Zhen Chyi
    </div>
  </div>
</body>
</html>
