<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderly</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #07090d;
      color: #f5f5f7;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }
    p {
      color: #b8c0cc;
      line-height: 1.7;
      font-size: 17px;
    }
    a {
      color: #8ab4ff;
      text-decoration: none;
    }
    .card {
      margin-top: 24px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/">← Back to home</a>
    <h1>Wanderly</h1>
    <p>
      Wanderly is a weather and ambience app that blends live conditions,
      local time, and immersive natural audio from places around the world.
    </p>

    <div class="card">
      <p><strong>Privacy Policy:</strong> <a href="/wanderly/privacy/">Open privacy policy</a></p>
    </div>
  </div>
</body>
</html>
